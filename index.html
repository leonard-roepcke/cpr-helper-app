<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>CPR Helper</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>CPR Helper</h1>
        <p class="subtitle">Metronom 110/min</p>
      </header>

      <section class="display" aria-live="polite">
        <div class="phase" id="phase-label">Bereit</div>
        <div class="counter" id="counter">—</div>
        <p class="display-hint">Jeder 5. Schlag mit höherem Ton</p>
      </section>

      <section class="controls">
        <button class="btn btn-primary" id="start-btn" type="button">Start</button>
        <button class="btn btn-secondary" id="stop-btn" type="button" disabled>Stopp</button>
      </section>

      <button class="btn btn-volume" id="volume-btn" type="button">
        Lautstärke auf Maximum
      </button>

      <footer class="footer">
        <span>110 BPM</span>
        <span aria-hidden="true">·</span>
        <span id="status">Gestoppt</span>
      </footer>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
