<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>CPR Helper</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>CPR Helper</h1>
        <p class="subtitle">Metronom 110/min · Reanimationshilfe</p>
      </header>

      <section class="display" aria-live="polite">
        <div class="phase" id="phase-label">Bereit</div>
        <div class="counter" id="counter">—</div>
        <div class="ratio-info" id="ratio-info">Nur Metronom · 110/min</div>
      </section>

      <section class="controls">
        <button class="btn btn-primary" id="start-btn" type="button">Start</button>
        <button class="btn btn-secondary" id="stop-btn" type="button" disabled>Stopp</button>
      </section>

      <button class="btn btn-volume" id="volume-btn" type="button">
        Lautstärke auf Maximum
      </button>

      <section class="ratios" aria-label="Atmungsmodus">
        <p class="section-label">Modus</p>
        <div class="ratio-buttons">
          <button class="btn btn-ratio active" data-ratio="standard" type="button">Standard</button>
          <button class="btn btn-ratio" data-ratio="30:2" type="button">30:2</button>
          <button class="btn btn-ratio" data-ratio="15:2" type="button">15:2</button>
          <button class="btn btn-ratio" data-ratio="10:1" type="button">10:1</button>
        </div>
        <p class="hint" id="ratio-hint">Nur Metronom ohne Atmungspausen</p>
      </section>

      <section class="age-profiles" aria-label="Atemfrequenz nach Alter">
        <p class="section-label">Atemfrequenz</p>
        <div class="age-buttons">
          <button class="btn btn-age active" data-age="adult" type="button">
            <span class="age-title">Erwachsene</span>
            <span class="age-meta">ab 12 J. · AF 10/min</span>
          </button>
          <button class="btn btn-age" data-age="child" type="button">
            <span class="age-title">Kind</span>
            <span class="age-meta">1–12 J. · AF 12/min</span>
          </button>
          <button class="btn btn-age" data-age="infant" type="button">
            <span class="age-title">Kleinkind</span>
            <span class="age-meta">0–1 J. · AF 20/min</span>
          </button>
        </div>
        <p class="hint" id="age-hint">ab 12 Jahre · AF 10/min · 30:2 · 2 Beatmungen je Zyklus</p>
      </section>

      <footer class="footer">
        <span>110 BPM</span>
        <span aria-hidden="true">·</span>
        <span id="status">Gestoppt</span>
      </footer>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
